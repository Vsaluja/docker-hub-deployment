version: "3.8"

services:
  mysqldb:
    image: mysql:8
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - my-db-volume:/var/lib/mysql

  nodejs:
    image: ${DOCKER_USERNAME}/docker-backend:latest
    container_name: node_container
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mysqldb
    environment:
      DB_HOST: mysqldb
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: appdb

volumes:
  my-db-volume: